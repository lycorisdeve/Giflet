name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  python-package:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: giflet-python-package
          path: |
            dist/*.whl
            dist/*.tar.gz

  windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build EXE
        run: python -m PyInstaller --noconfirm --windowed --name Giflet app.py

      - name: Package EXE
        shell: pwsh
        run: Compress-Archive -Path dist\Giflet\* -DestinationPath Giflet-windows-x64.zip -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: giflet-windows-x64
          path: Giflet-windows-x64.zip

  docker-package:
    name: Publish GHCR package
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lycorisdeve/giflet
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [python-package, windows-exe, docker-package]
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download Windows EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: giflet-windows-x64
          path: release-assets/giflet-windows-x64

      - name: Download Python package artifact
        uses: actions/download-artifact@v4
        with:
          name: giflet-python-package
          path: release-assets/giflet-python-package

      - name: Publish release
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -type f \( -name '*.zip' -o -name '*.whl' -o -name '*.tar.gz' \) -print)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --title "Giflet $RELEASE_TAG" --generate-notes
          fi
